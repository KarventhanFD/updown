<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>We Are Hiring</title>
</head>
<body class="bg-black flex justify-center items-center min-h-screen">

    <section class="text-center py-12 px-6 bg-white text-black">
        <!-- Icon -->
        <div class="flex justify-center">
            <div class="bg-gray-800 p-4 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" stroke-width="2" stroke="white" class="w-12 h-12">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7V6a4 4 0 0 0-8 0v1M9 22h6a3 3 0 0 0 3-3v-4a3 3 0 0 0-3-3H9a3 3 0 0 0-3 3v4a3 3 0 0 0 3 3z"/>
                </svg>
            </div>
        </div>
        
        <!-- Heading -->
        <h2 class="text-xl font-bold text-center text-pink-500 mt-4">
            We are Hiring!
        </h2>
        
        <!-- Description -->
        <p class=" text-center mt-2 px-4 md:px-20 lg:px-32">
            Together with new input from your side, work with us on developing 
            something one of a kind for clients, that literally blows their minds.
        </p>

        <!-- Button -->
        <div class="mt-6 flex justify-center">
            <a href="#" class="bg-pink-500 text-white px-6 py-3 rounded-lg text-lg font-semibold 
                             hover:bg-pink-600 transition duration-300">
                Apply Now
            </a>
        </div>
    </section>
</body>
</html>
