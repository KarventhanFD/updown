   <style>
        /* Gallery Styles */
        .album-image {
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        /* Collage Grid Styles */
        #album-images-grid {
            display: grid;
            grid-auto-rows: minmax(150px, auto);
            grid-gap: 15px;
        }
        
        #album-images-grid > div {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        #album-images-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        #album-images-grid > div:hover img {
            transform: scale(1.05);
        }
        
        /* Responsive adjustments */
        @media (min-width: 640px) {
            #album-images-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-auto-rows: minmax(180px, auto);
            }
        }
        
        @media (min-width: 768px) {
            #album-images-grid {
                grid-template-columns: repeat(3, 1fr);
                grid-auto-rows: minmax(200px, auto);
                grid-gap: 20px;
            }
        }
        
        @media (min-width: 1024px) {
            #album-images-grid {
                grid-template-columns: repeat(4, 1fr);
                grid-auto-rows: minmax(220px, auto);
                grid-gap: 25px;
            }
        }
        
        /* Size classes for collage */
        .size-small {
            grid-row: span 1;
            grid-column: span 1;
        }
        
        .size-medium {
            grid-row: span 2;
            grid-column: span 1;
        }
        
        .size-wide {
            grid-row: span 1;
            grid-column: span 2;
        }
        
        .size-large {
            grid-row: span 2;
            grid-column: span 2;
        }
    </style>

                ],

                description: "Stunning portrait collection that captures the essence of personality and emotion.",
                coverImage: "gallery-2.jpg",
                images: [
                    "gallery-2.jpg",

                ],

            }
        ];

        // DOM elements
        const albumContainer = document.getElementById('album-container');
        const albumDetailsPage = document.getElementById('album-details-page');
        const backToGalleryBtn = document.getElementById('back-to-gallery');

        // Function to create album HTML
        function createAlbumElement(album) {
            return `
                <div class="bg-[#C4B5FD] rounded-lg overflow-hidden shadow-md hover:shadow-xl transition-shadow duration-300 ">
                    <div class="relative overflow-hidden">
                        <img src="../Gallery/Home page/${album.coverImage}" alt="${album.title}" class="w-full album-image h-64 object-cover hover:scale-110 transition-transform duration-500">
                        <div class="absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity duration-300">
                            <button class="view-album text-white text-lg font-semibold bg-blue-500 hover:bg-blue-600 px-6 py-2 rounded-full transition-colors duration-300" data-album-id="${album.id}">View Album</button>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">${album.title}</h3>
                        <p class="text-gray-600 mb-4">${album.description}</p>
                        <div class="flex justify-between items-center text-sm text-gray-500">
                            <span><i class="fas fa-images mr-1"></i> ${album.photoCount} photos</span>
                            <span><i class="fas fa-calendar-alt mr-1"></i> ${album.date}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Function to render albums
        function renderAlbums() {
            albumContainer.innerHTML = albums.map(album => createAlbumElement(album)).join('');
            
            // Add event listeners to all view album buttons
            document.querySelectorAll('.view-album').forEach(button => {
                button.addEventListener('click', function() {
                    const albumId = parseInt(this.getAttribute('data-album-id'));
                    showAlbumDetails(albumId);
                });
            });
        }

        // Function to generate random size class for collage
        function getRandomSizeClass() {
            const sizes = ['size-small', 'size-medium', 'size-wide', 'size-large'];
            return sizes[Math.floor(Math.random() * sizes.length)];
        }

        // Function to show album details
        function showAlbumDetails(albumId) {
            const album = albums.find(a => a.id === albumId);
            if (!album) return;

            // Update album details
            document.getElementById('album-title').textContent = album.title;
            document.getElementById('album-description').textContent = album.description;
            document.getElementById('album-date').textContent = album.date;
            document.getElementById('album-category').textContent = album.category.charAt(0).toUpperCase() + album.category.slice(1);
            document.getElementById('album-photo-count').textContent = `${album.photoCount} photos`;
            
            // Set cover image
            const coverImg = document.getElementById('album-cover-image');
            coverImg.src = `../Gallery/Home page/${album.coverImage}`;
            coverImg.alt = album.title;

            // Render collage gallery
            const imagesGrid = document.getElementById('album-images-grid');
            imagesGrid.innerHTML = album.images.map(image => `
                <div class="${getRandomSizeClass()}">
                    <img src="../Gallery/Home page/${image}" alt="${album.title}" class="w-full h-full object-cover rounded-lg hover:shadow-lg transition-all duration-300">
                </div>
            `).join('');

            // Show details page and hide gallery
            albumContainer.style.display = 'none';
            albumDetailsPage.style.display = 'block';
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Function to go back to gallery
        function backToGallery() {
            albumDetailsPage.style.display = 'none';
            albumContainer.style.display = 'grid';
        }

        // Event listeners
        backToGalleryBtn.addEventListener('click', backToGallery);

        // Initialize the gallery when page loads
        document.addEventListener('DOMContentLoaded', renderAlbums);
    </script>
