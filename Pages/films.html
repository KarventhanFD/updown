    },

      views: '205K',

    },
    {
      id: 'Cho-SZqIVrU',
      title: 'Beautiful PreWed For Govarthanan & VishnuPriya ',
      views: '78K',
      likes: '5.6K'
    }
  ];

  // Function to load videos
  function loadVideos() {
    const container = document.getElementById('videos-container');
    const template = document.getElementById('video-template');

    videos.forEach(video => {
      const clone = template.content.cloneNode(true);
      
      // Set video iframe
      const iframe = clone.querySelector('.youtube-iframe');
      iframe.src = `https://www.youtube.com/embed/${video.id}?rel=0&modestbranding=1`;
      
      // Set video info
      clone.querySelector('.video-title').textContent = video.title;
      clone.querySelector('.video-views').textContent = video.views;
      clone.querySelector('.video-likes').textContent = video.likes;
      
      container.appendChild(clone);
    });
  }

  // Initialize when DOM is loaded
  document.addEventListener('DOMContentLoaded', () => {
    loadVideos();
    
    // Mobile menu toggle
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.createElement('div');
    mobileMenu.id = 'mobileMenu';
    mobileMenu.className = 'fixed inset-0 bg-black bg-opacity-95 flex flex-col items-center justify-center text-center transform translate-y-full md:hidden z-40 pt-16';
    mobileMenu.innerHTML = `
      <div class="flex flex-col space-y-6 w-full px-6">
        <a href="gallery.html" class="text-white text-xl py-2">Gallery</a>
        <a href="films.html" class="text-cyan-400 text-xl py-2">Films</a>
        <a href="stories.html" class="text-white text-xl py-2">Stories</a>
        <a href="about.html" class="text-white text-xl py-2">About</a>
        <a href="book-now.html" class="text-[#FFD645] text-xl py-2">Book Now</a>
      </div>
    `;
    document.body.appendChild(mobileMenu);

    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('translate-y-full');
      mobileMenu.classList.toggle('translate-y-0');
      document.body.style.overflow = mobileMenu.classList.contains('translate-y-0') ? 'hidden' : 'auto';
    });

    // Close mobile menu when clicking on links
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.add('translate-y-full');
        mobileMenu.classList.remove('translate-y-0');
        document.body.style.overflow = 'auto';
      });
    });
  });
</script>
